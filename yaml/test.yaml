data:
  tickers:
    - UCG.MI
    - ISP.MI
  start_date: "2020-01-01"
  end_date: "2026-04-30"
  freq: "B"

cv:
  h: 5
  n_windows: 3
  step_size: 1
  refit: true

models:
  - AutoNHITS
  - AutoNBEATS
  - AutoTFT

tuning:
  num_samples: 2
  cpus: 6
  gpus: 1
  backend: "ray"
  searcher: "optuna"
  scheduler: "asha"
  metric: "loss"
  mode: "min"
  asha_max_t: 5
  asha_grace_period: 1
  asha_reduction_factor: 2

runtime:
  out_dir: "./out"
  cuda_visible_devices: "0"
  test: true

evaluation:
  metric: MAPE
  reconciliation_method: wls_var


