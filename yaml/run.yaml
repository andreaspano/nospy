data:
  tickers:
    - UCG.MI
    - ISP.MI
    - BAMI.MI
    - BPE.MI
    - BMPS.MI
    - FBK.MI
    - MB.MI
    - G.MI
    - AZM.MI
    - UNI.MI
  start_date: "2016-01-01"
  end_date: "2026-04-30"
  freq: "B"

cv:
  h: 5
  n_windows: 6
  step_size: 1
  refit: true

models:
  - AutoNHITS
  - AutoNBEATS
  - AutoTFT

tuning:
  num_samples: 40
  cpus: 6
  gpus: 1
  backend: "ray"
  searcher: "optuna"
  scheduler: "asha"
  tune_objective: "loss"
  mode: "min"
  asha_max_t: 25
  asha_grace_period: 3
  asha_reduction_factor: 2

runtime:
  out_dir: "./out"
  cuda_visible_devices: "0"
  test: false

evaluation:
  metric: MAE
  reconciliation_method: wls_var
features:
  use_views: true
  min_length: 20
  include_catch22: true
  include_model_shape: true


