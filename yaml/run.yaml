data:
  tickers:
    - UCG.MI
    - ISP.MI
    - BAMI.MI
    - BPE.MI
    - BMPS.MI
    - FBK.MI
    - MB.MI
    - G.MI
    - AZM.MI
    - UNI.MI
  start_date: "2016-01-01"
  end_date: "2026-04-30"
  freq: "B"

cv:
  h: 12
  n_windows: 8
  step_size: 1
  refit: true

models:
  - AutoNHITS
  - AutoNBEATS
  - AutoTFT

tuning:
  num_samples: 10
  cpus: 6
  gpus: 1
  backend: "ray"
  searcher: "optuna"
  scheduler: "asha"
  tune_objective: "loss"
  mode: "min"
  asha_max_t: 50
  asha_grace_period: 5
  asha_reduction_factor: 3

runtime:
  out_dir: "./out"
  cuda_visible_devices: "0"
  test: false

llm:
  provider: copilot
  model: gpt-4o
  temperature: 0.2

evaluation:
  metric: MAE
  reconciliation_method: wls_var


